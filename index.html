<!DOCTYPE html> <!-- Diz que o documento é HTML5 -->
<html lang="pt-BR"> <!-- Define que o idioma da página é português do Brasil -->

<head>
    <meta charset="UTF-8"> <!-- Permite usar acentos e caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site se adaptar bem em celular -->

    <title>Modelo</title> <!-- Título que aparece na aba do navegador -->

    <link rel="stylesheet" href="estilo.css">
    <!-- Conecta o HTML com o arquivo de estilo (CSS) -->
</head>

<body id='body' onload="carregar()"> 
<!-- Quando a página carrega, executa a função "carregar()" do JavaScript -->
    <audio id="musica" autoplay loop muted>
        <source src="lofi.mp3" type="audio/mpeg">
    </audio>
    <header>
        <h1>Hora do Dia</h1> 
        <!-- Título principal da página -->
    </header>

    <section id="sac">
        <!-- Área principal do conteúdo -->

        <div>
            <h1 id="msg">

            </h1>
            <!-- Esse texto provavelmente será alterado pelo JavaScript -->
        </div>

        <div id="foto">
            <!-- Área onde vai ficar a imagem -->

            <img id="imagem" src="fotomanhã.png" alt="foto do dia">
            <!-- Imagem inicial da página -->
            <!-- id="imagem" permite alterar ela pelo JavaScript -->
        </div>
        <div id="recado" class="recado">

        </div>       
    </section>

    <footer>
        <p>&copy; Henrique da Paz Mendes</p>
        <!-- Rodapé com teu nome -->
    </footer>

    <script src="script.js"></script>
    <!-- Conecta com o JavaScript que controla o comportamento da página -->

</body>
</html>
